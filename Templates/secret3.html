<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Secret Room</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Python icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated snake pattern background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 217, 51, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(66, 133, 244, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            background: linear-gradient(135deg, #306998 0%, #ffd43b 100%);
            color: #1a1a2e;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(255, 217, 51, 0.3);
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .python-icon {
            font-size: 3em;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        main {
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            margin: 20px auto;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            position: relative;
            z-index: 1;
            border: 3px solid #ffd43b;
        }

        .secret-content {
            text-align: center;
            padding: 20px;
        }

        .secret-content h2 {
            color: #306998;
            font-size: 2em;
            margin-bottom: 15px;
        }

        .code-block {
            background: #1a1a2e;
            color: #ffd43b;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Fira Code', monospace;
            text-align: left;
            margin: 20px 0;
            border-left: 4px solid #306998;
            overflow-x: auto;
        }

        .code-block .keyword {
            color: #ff6b6b;
        }

        .code-block .string {
            color: #51cf66;
        }

        .code-block .function {
            color: #74c0fc;
        }

        .secret-code-display {
            font-size: 1.4em;
            font-weight: bold;
            color: #ffd43b;
            background: linear-gradient(135deg, #306998, #1a1a2e);
            padding: 15px 25px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: 'Fira Code', monospace;
            box-shadow: 0 4px 15px rgba(255, 217, 51, 0.3);
        }

        .btn-python {
            background: linear-gradient(135deg, #306998, #3b82f6);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(48, 105, 152, 0.4);
        }

        .btn-python:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(48, 105, 152, 0.6);
            color: #ffd43b;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #495057);
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.6);
        }

        .snake-decoration {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            font-size: 1.5em;
        }

        .snake-decoration i {
            color: #ffd43b;
            animation: slither 2s ease-in-out infinite;
        }

        .snake-decoration i:nth-child(2) {
            animation-delay: 0.2s;
        }

        .snake-decoration i:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes slither {
            0%, 100% { transform: scaleX(1); }
            50% { transform: scaleX(1.2); }
        }

        .python-console {
            background: #1a1a2e;
            color: #ffd43b;
            padding: 25px;
            border-radius: 15px;
            font-family: 'Fira Code', monospace;
            text-align: left;
            margin: 20px 0;
            border: 3px solid #306998;
            box-shadow: 0 8px 25px rgba(48, 105, 152, 0.5);
        }

        .python-console-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 217, 51, 0.3);
        }

        .python-console-header i {
            color: #ffd43b;
            font-size: 1.5em;
        }

        .python-console-header span {
            color: #74c0fc;
            font-weight: 600;
        }

        .console-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .console-prompt {
            color: #51cf66;
            font-weight: bold;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .console-input {
            flex: 1;
            background: #0f0f1a;
            border: 2px solid #306998;
            border-radius: 8px;
            padding: 12px 15px;
            color: #ffd43b;
            font-family: 'Fira Code', monospace;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .console-input:focus {
            border-color: #ffd43b;
        }

        .console-input::placeholder {
            color: rgba(255, 217, 51, 0.4);
        }

        .btn-run {
            background: linear-gradient(135deg, #51cf66, #37b24d);
            border: none;
            color: white;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-run:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(81, 207, 102, 0.5);
        }

        .console-output {
            background: #0f0f1a;
            border-radius: 8px;
            padding: 15px;
            min-height: 60px;
            border-left: 3px solid #74c0fc;
        }

        .console-output-label {
            color: #ff6b6b;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .console-output-text {
            color: #51cf66;
            font-size: 1.1em;
        }

        .console-output-text.error {
            color: #ff6b6b;
        }

        .console-output-text.info {
            color: #74c0fc;
        }
    </style>
</head>
<body>
    <header>
        <div class="python-icon">
            <i class="fab fa-python"></i>
        </div>
        <h1>🐍 Welcome to the Python Zone! 🐍</h1>
        <p>You cracked the code and unlocked this Python-powered secret area!</p>
    </header>

    <main>
        <div class="secret-content">
            <h2><i class="fas fa-code"></i> Python Secret Room</h2>
            <p>Congratulations! You've discovered the exclusive Python developer area!</p>

            <div class="snake-decoration">
                <i class="fas fa-snake"></i>
                <i class="fab fa-python"></i>
                <i class="fas fa-snake"></i>
            </div>

            <div class="python-console">
                <div class="python-console-header">
                    <i class="fab fa-python"></i>
                    <span>Python Interactive Console</span>
                </div>
                <div class="console-input-group">
                    <span class="console-prompt">&gt;&gt;&gt;</span>
                    <input type="text" class="console-input" id="pythonInput" placeholder='Try: print("hello")...' autocomplete="off">
                    <button class="btn-run" onclick="runPythonCode()">
                        <i class="fas fa-play"></i> RUN
                    </button>
                </div>
                <div class="console-output">
                    <div class="console-output-label">Output:</div>
                    <div class="console-output-text" id="outputText">Waiting for input...</div>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <a href="/" class="btn btn-python"><i class="fas fa-home"></i> Return to Home</a>
                <a href="/newpage" class="btn btn-secondary"><i class="fas fa-path"></i> Back to Memory Lane</a>
            </div>
        </div>
    </main>

    <script>
        function runPythonCode() {
            const input = document.getElementById('pythonInput').value.trim();
            const outputText = document.getElementById('outputText');

            // Check for open(trials) command - L14's secret access
            if (input === 'open(trials)') {
                outputText.textContent = '>> ACCESSING TRIAL PROTOCOLS...';
                outputText.className = 'console-output-text info';

                // Set flag that trials are unlocked (session-based)
                sessionStorage.setItem('l14_trials_unlocked', 'true');

                setTimeout(() => {
                    outputText.textContent = '>> SOMETHING HAS SHIFTED IN SECTOR 3...';
                    outputText.className = 'console-output-text info';
                }, 1000);

                setTimeout(() => {
                    outputText.textContent = '>> L14\'s trial is now accessible. Go to Sector 3.';
                    outputText.className = 'console-output-text';
                }, 2500);

                return;
            }

            // Check for send(rescue) command - E13's secret access
            if (input === 'send(rescue)') {
                outputText.textContent = '>> TRANSMITTING RESCUE SIGNAL...';
                outputText.className = 'console-output-text info';

                // Set flag that E13's trial is unlocked (session-based)
                sessionStorage.setItem('e13_trial_unlocked', 'true');

                setTimeout(() => {
                    outputText.textContent = '>> SIGNAL RECEIVED IN SECTOR 5...';
                    outputText.className = 'console-output-text info';
                }, 1000);

                setTimeout(() => {
                    outputText.textContent = '>> E13\'s trial is now accessible. Go to Sector 5.';
                    outputText.className = 'console-output-text';
                }, 2500);

                return;
            }

            // Only 3 valid solutions
            if (input === 'print("hello")') {
                outputText.textContent = 'hello';
                outputText.className = 'console-output-text';
            }
            else if (input === 'print("code_part")') {
                outputText.textContent = 'code_part';
                outputText.className = 'console-output-text';
            }
            else if (input === 'execute game') {
                outputText.textContent = '🎮 Game launched! Starting adventure...';
                outputText.className = 'console-output-text info';
                window.location.href = '/sliding-puzzle';
            }
            else {
                outputText.textContent = `code not available`;
                outputText.className = 'console-output-text error';
            }
        }

        // Allow pressing Enter to run
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('pythonInput');
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    runPythonCode();
                }
            });
        });
    </script>

</body>
</html>
