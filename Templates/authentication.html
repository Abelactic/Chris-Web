<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <style>
        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff00c1, -2px 0 #01ffff; }
            25% { text-shadow: -2px 0 #ff00c1, 2px 0 #01ffff; }
            50% { text-shadow: 2px 0 #ff00c1, -2px 0 #01ffff; }
            75% { text-shadow: -2px 0 #ff00c1, 2px 0 #01ffff; }
            100% { text-shadow: 2px 0 #ff00c1, -2px 0 #01ffff; }
        }
        @keyframes border-glitch {
            0% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            25% { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
            50% { border-color: #ff00c1; box-shadow: 0 0 10px #ff00c1; }
            75% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            100% { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
        }
        body {
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.15) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.15) 2px, transparent 2px);
            background-size: 40px 40px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
        }
        .auth-container {
            background-color: #111;
            padding: 40px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: border-glitch 3s infinite;
        }
        h1 {
            color: #00ff00;
            margin-bottom: 30px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: glitch 0.5s infinite;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #00ff00;
            border-radius: 0;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            background-color: #0a0a0a;
            color: #00ff00;
            outline: none;
        }
        input::placeholder {
            color: #00aa00;
        }
        input:focus {
            box-shadow: 0 0 10px #00ff00;
        }
        button {
            background-color: #00ff00;
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 0;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #00aa00;
            box-shadow: 0 0 20px #00ff00;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #00ff00;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
            text-shadow: 0 0 10px #00ff00;
        }
        .message {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            display: none;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }
        .message.success {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        .message.error {
            color: #ff0040;
            text-shadow: 0 0 10px #ff0040;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>🔐 Authentication</h1>
        <input type="text" placeholder="Username" id="username" onkeypress="handleKeyPress(event)">
        <input type="password" placeholder="Password" id="password" onkeypress="handleKeyPress(event)">
        <button onclick="authenticate()">Login</button>
        <div id="message" class="message"></div>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                authenticate();
            }
        }

        function authenticate() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            if (username === 'CMVN' && password === 'AdMiN9+10') {
                messageDiv.textContent = 'Login successful! Welcome, CMVN!';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                setTimeout(function() {
                    messageDiv.style.display = 'none';
                    window.location.href = '/admin-panel';
                }, 3000);
            } else if (username && password) {
                messageDiv.textContent = 'Incorrect username or password!';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                setTimeout(function() {
                    messageDiv.style.display = 'none';
                }, 3000);
            } else {
                messageDiv.textContent = 'Please enter both username and password!';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                setTimeout(function() {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
