<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sliding Number Puzzle</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .game-header {
            color: #ffd43b;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-instructions {
            color: #74c0fc;
            font-size: 1.2em;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
            padding: 0 20px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: linear-gradient(135deg, #306998, #1a1a2e);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(255, 217, 51, 0.3);
            border: 3px solid #ffd43b;
        }

        .game-tile {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ffd43b, #ffaa00);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: 'Poppins', sans-serif;
        }

        .game-tile:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 217, 51, 0.5);
        }

        .game-tile.empty {
            background: transparent;
            cursor: default;
            box-shadow: none;
        }

        .game-tile.correct {
            background: linear-gradient(135deg, #51cf66, #37b24d);
            color: white;
        }

        .game-controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn-shuffle {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            color: white;
            padding: 15px 35px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-shuffle:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
        }

        .btn-home {
            background: linear-gradient(135deg, #306998, #3b82f6);
            border: none;
            color: white;
            padding: 15px 35px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(48, 105, 152, 0.5);
        }

        .move-counter {
            color: #ffd43b;
            font-size: 1.5em;
            margin-top: 20px;
            font-family: 'Fira Code', monospace;
        }

        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #51cf66, #37b24d);
            color: white;
            padding: 50px 80px;
            border-radius: 20px;
            font-size: 2.5em;
            font-weight: bold;
            z-index: 1001;
            text-align: center;
            box-shadow: 0 10px 50px rgba(81, 207, 102, 0.5);
            animation: winPulse 0.5s ease-in-out infinite alternate;
        }

        .win-message.active {
            display: block;
        }

        @keyframes winPulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.05); }
        }

        .python-decoration {
            color: #ffd43b;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .shovel-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .shovel-item {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #51cf66, #37b24d);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(81, 207, 102, 0.5);
            transition: all 0.3s ease;
            animation: shovelGlow 2s ease-in-out infinite;
        }

        .shovel-item:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 6px 30px rgba(81, 207, 102, 0.8);
        }

        .shovel-item.collected {
            animation: collectShovel 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes shovelGlow {
            0%, 100% { box-shadow: 0 4px 20px rgba(81, 207, 102, 0.5); }
            50% { box-shadow: 0 4px 30px rgba(81, 207, 102, 0.8); }
        }

        @keyframes collectShovel {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .shovel-tooltip {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #ffd43b;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.8em;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .shovel-item:hover .shovel-tooltip {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="python-decoration">
        <i class="fab fa-python"></i>
    </div>
    <h1 class="game-header">🧩 Sliding Number Puzzle</h1>
    <p class="game-instructions">Arrange the numbers in order: 1, 2, 3, 4, 5, 6, 7, 8 (empty space at the end). Click tiles adjacent to the empty space to move them.</p>

    <div class="game-board" id="gameBoard"></div>

    <div class="move-counter">Moves: <span id="moveCount">0</span></div>

    <div class="game-controls">
        <button class="btn-shuffle" onclick="shuffleBoard()">
            <i class="fas fa-random"></i> Shuffle
        </button>
        <button class="btn-home" onclick="goHome()">
            <i class="fas fa-home"></i> Back to Python Room
        </button>
    </div>

    <!-- Hidden Shovel -->
    <div class="shovel-container" id="shovelContainer">
        <div class="shovel-item" id="shovel" onclick="collectShovel()">
            ⛏️
            <div class="shovel-tooltip">Click to collect!</div>
        </div>
    </div>

    <!-- Win Message -->
    <div class="win-message" id="winMessage">
        🎉 You Win! 🎉
    </div>

    <script>
        // Sliding Puzzle Game Variables
        let board = [1, 2, 3, 4, 5, 6, 7, 8, 0]; // 0 represents empty space
        let moves = 0;
        let gameWon = false; // Track if game is won

        // Initialize game on page load
        document.addEventListener('DOMContentLoaded', function() {
            shuffleBoard();
        });

        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            for (let i = 0; i < board.length; i++) {
                const tile = document.createElement('div');
                tile.className = 'game-tile';
                
                if (board[i] === 0) {
                    tile.classList.add('empty');
                } else {
                    tile.textContent = board[i];
                    // Check if tile is in correct position
                    if (board[i] === i + 1) {
                        tile.classList.add('correct');
                    }
                    // Only allow clicks if game is not won
                    if (!gameWon) {
                        tile.onclick = () => moveTile(i);
                    }
                }
                
                gameBoard.appendChild(tile);
            }
        }

        function moveTile(index) {
            // Prevent moves if game is won
            if (gameWon) return;

            const emptyIndex = board.indexOf(0);
            
            // Check if move is valid (adjacent to empty space)
            const isValidMove = 
                (index === emptyIndex - 3) || // up
                (index === emptyIndex + 3) || // down
                (emptyIndex % 3 !== 0 && index === emptyIndex - 1) || // left
                ((emptyIndex + 1) % 3 !== 0 && index === emptyIndex + 1); // right

            if (isValidMove) {
                // Swap tiles
                [board[index], board[emptyIndex]] = [board[emptyIndex], board[index]];
                moves++;
                updateMoveCount();
                renderBoard();
                checkWin();
            }
        }

        function shuffleBoard() {
            // Reset game state
            gameWon = false;
            document.getElementById('winMessage').classList.remove('active');
            
            // Perform random valid moves to shuffle
            for (let i = 0; i < 100; i++) {
                const emptyIndex = board.indexOf(0);
                const possibleMoves = [];

                if (emptyIndex >= 3) possibleMoves.push(emptyIndex - 3); // up
                if (emptyIndex <= 5) possibleMoves.push(emptyIndex + 3); // down
                if (emptyIndex % 3 !== 0) possibleMoves.push(emptyIndex - 1); // left
                if ((emptyIndex + 1) % 3 !== 0) possibleMoves.push(emptyIndex + 1); // right

                const randomMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                [board[randomMove], board[emptyIndex]] = [board[emptyIndex], board[randomMove]];
            }

            moves = 0;
            updateMoveCount();
            renderBoard();
        }

        function updateMoveCount() {
            document.getElementById('moveCount').textContent = moves;
        }

        function checkWin() {
            const winCondition = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            const isWin = board.every((val, index) => val === winCondition[index]);

            if (isWin) {
                gameWon = true;
                document.getElementById('winMessage').classList.add('active');
                
                // Auto-reset after 3 seconds
                setTimeout(() => {
                    shuffleBoard();
                }, 3000);
            }
        }

        function goHome() {
            window.location.href = '/secret3';
        }

        // Shovel collection
        let shovelCollected = false;

        async function collectShovel() {
            if (shovelCollected) return;
            
            shovelCollected = true;
            const shovel = document.getElementById('shovel');
            shovel.classList.add('collected');

            try {
                const response = await fetch('/add_item', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({item: '🗝️ Shovel'})
                });

                const data = await response.json();
                
                if (data.success) {
                    // Show collection message
                    const tooltip = shovel.querySelector('.shovel-tooltip');
                    tooltip.textContent = 'Added to inventory!';
                    tooltip.style.opacity = '1';
                    tooltip.style.top = '-50px';
                    
                    setTimeout(() => {
                        document.getElementById('shovelContainer').style.display = 'none';
                    }, 600);
                }
            } catch (error) {
                console.error('Error collecting shovel:', error);
                shovelCollected = false;
                shovel.classList.remove('collected');
            }
        }
    </script>
</body>
</html>
